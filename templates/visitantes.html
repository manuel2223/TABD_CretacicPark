<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InGen - Registro de Visitantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-success">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="/">🌿 InGen - Centro de Visitantes</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link text-warning" href="/">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link text-info" href="/panel_empleados">RRHH</a></li>
                    <li class="nav-item"><a class="nav-link text-success active" href="/panel_visitantes">Visitantes</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="/panel_incidencias">Alertas</a></li>
                </ul>
                <button class="btn btn-success fw-bold" onclick="abrirModalVisitante()">+ Registrar Turista</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="text-success border-bottom border-secondary pb-2">Libro de Visitas</h2>
                <p class="text-muted">Control de acceso y datos de contacto de los huéspedes actuales.</p>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-striped border-secondary">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>DNI / Pasaporte</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody id="tabla-visitantes">
                    <tr><td colspan="4" class="text-center">Cargando base de datos de visitantes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade text-dark" id="modalVisitante" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-light border-success border-2">
                <div class="modal-header bg-black text-success">
                    <h5 class="modal-title">Nuevo Registro de Entrada</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formVisitante">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control" id="visNombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">DNI o Pasaporte</label>
                            <input type="text" class="form-control" id="visDni" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Teléfono de Emergencia</label>
                            <input type="text" class="form-control" id="visTel" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Confirmar Ingreso</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/visitantes.js') }}"></script>
</body>
</html>
