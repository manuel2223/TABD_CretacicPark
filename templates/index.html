<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Parque InGen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-warning">
        <div class="container-fluid">
            <a class="navbar-brand text-warning fw-bold" href="/">InGen - Activos</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link text-warning active" href="/">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link text-info" href="/panel_empleados">RRHH</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="/panel_recintos">Recintos</a></li>
                    <li class="nav-item"><a class="nav-link text-success" href="/panel_visitantes">Visitantes</a></li>
                    <li class="nav-item"><a class="nav-link text-warning" href="/panel_ventas">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="/panel_incidencias">Alertas</a></li>
                </ul>
                <button class="btn btn-warning me-2" onclick="abrirModalDino()">+ Nuevo Activo</button>
                <button class="btn btn-danger" onclick="abrirModalIncidencia()">Registrar Incidencia</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="text-warning border-bottom border-secondary pb-2">Panel de Control: Activos Biológicos</h2>
                <p class="text-muted">Monitorización de recintos en tiempo real.</p>
            </div>
        </div>

        <div class="row" id="contenedor-dinosaurios">
            <div class="text-center text-warning">
                <div class="spinner-border" role="status"></div>
                <p class="mt-2">Conectando con la red del parque...</p>
            </div>
        </div>
    </div>

    <div class="modal fade text-dark" id="modalDino" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-light border-warning border-2">
                <div class="modal-header bg-black text-warning">
                    <h5 class="modal-title" id="modalDinoTitle">Registrar Nuevo Activo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formDino">
                        <input type="hidden" id="dinoAction" value="crear">
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID Activo</label>
                            <input type="number" class="form-control" id="dinoId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Propio</label>
                            <input type="text" class="form-control" id="dinoNombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Especie</label>
                            <input type="text" class="form-control" id="dinoEspecie" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Dieta Base</label>
                            <select class="form-select" id="dinoDieta" required>
                                <option value="Carnívoro">Carnívoro</option>
                                <option value="Herbívoro">Herbívoro</option>
                                <option value="Omnívoro">Omnívoro</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID Recinto</label>
                            <input type="number" class="form-control" id="dinoRecintoId" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold">Guardar en Sistema</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade text-dark" id="modalIncidencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-light border-danger border-2">
                <div class="modal-header bg-black text-danger">
                    <h5 class="modal-title">🚨 Registrar Nueva Incidencia</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formIncidencia">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Descripción del Evento</label>
                            <textarea class="form-control" id="incDesc" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID Recinto Afectado</label>
                            <input type="number" class="form-control" id="incRecinto" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nivel de Alerta</label>
                            <select class="form-select" id="incNivel" required>
                                <option value="Bajo">Bajo (Fallo menor)</option>
                                <option value="Medio">Medio (Brecha potencial)</option>
                                <option value="Alto">Alto (Escape inminente)</option>
                                <option value="Crítico">Crítico (Pérdida de control)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold">Emitir Alerta a toda la red</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
