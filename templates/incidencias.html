<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InGen - Registro de Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger">
        <div class="container-fluid">
            <a class="navbar-brand text-danger fw-bold" href="/">🦖 Cretacic Park - Seguridad</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light me-2">Volver al Catálogo</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="text-danger border-bottom border-secondary pb-2">Bitácora Oficial de Incidentes</h2>
                <p class="text-muted">Registro histórico de fallos, brechas y eventos inusuales en los recintos.</p>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-hover border-secondary">
                <thead class="table-active">
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Sector Afectado</th>
                        <th>Nivel de Alerta</th>
                        <th>Descripción del Evento</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-incidencias">
                    <tr><td colspan="5" class="text-center">Cargando bitácora de seguridad...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade text-dark" id="modalEditarIncidencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-light border-danger border-2">
                <div class="modal-header bg-black text-danger">
                    <h5 class="modal-title">Modificar Registro</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditInc">
                        <input type="hidden" id="editIncRecinto">
                        <input type="hidden" id="editIncViejaDesc">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Descripción del Evento</label>
                            <textarea class="form-control" id="editIncDesc" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nivel de Alerta</label>
                            <select class="form-select" id="editIncNivel" required>
                                <option value="Bajo">Bajo (Fallo menor)</option>
                                <option value="Medio">Medio (Brecha potencial)</option>
                                <option value="Alto">Alto (Escape inminente)</option>
                                <option value="Crítico">Crítico (Pérdida de control)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold">Actualizar Archivo</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/incidencias.js') }}"></script>
</body>
</html>
